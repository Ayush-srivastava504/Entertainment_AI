name: Catalog sync

on:
  schedule:
    # Incremental sync every 6 hours
    - cron: "0 */6 * * *"
    # Deep full sync once a week (Sunday 03:00 UTC)
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      full:
        description: "Run a full sync instead of incremental"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Apply schema (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate

      - name: Decide sync mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 3 * * 0" ] || [ "${{ inputs.full }}" = "true" ]; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Crawl anime (AniList -> Kitsu -> Jikan)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run ${{ steps.mode.outputs.full == 'true' && 'crawl:anime:full' || 'crawl:anime' }}

      - name: Crawl movies (TMDB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_READ_ACCESS_TOKEN: ${{ secrets.TMDB_API_READ_ACCESS_TOKEN }}
        run: npm run ${{ steps.mode.outputs.full == 'true' && 'crawl:movies:full' || 'crawl:movies' }}

      - name: Crawl blog (RSS)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional — only set once the AI Creator service (task #3) is deployed.
          # Unset is fine: the crawler falls back to extractive summaries.
          AI_SUMMARY_ENDPOINT: ${{ secrets.AI_SUMMARY_ENDPOINT }}
        run: npm run crawl:blog

      - name: Crawl trivia (OpenTDB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run crawl:trivia
